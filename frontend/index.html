<!-- NJ Real Estate Analyst - Improved Frontend -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Real Estate Advisor</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f8;
            text-align: center;
        }

        .container {
            background: white;
            padding: 30px;
            margin: 50px auto;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            margin-bottom: 20px;
        }

        label {
            display: block;
            text-align: left;
            width: 90%;
            margin: 10px auto 0 auto;
            font-weight: bold;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 95%;
            padding: 12px;
            background: black;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #333;
        }

        .result {
            margin-top: 20px;
            text-align: left;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 5px;
            color: white;
            display: inline-block;
        }

        .red { background: #e74c3c; }
        .green { background: #2ecc71; }
        .orange { background: #f39c12; }
    </style>
</head>

<body>

<div class="container">

    <h1>Your Real Estate Advisor</h1>

    <form id="houseForm">
        <label for="bedrooms">Bedrooms</label>
        <input type="number" id="bedrooms" placeholder="e.g. 3" required>

        <label for="bathrooms">Bathrooms</label>
        <input type="number" id="bathrooms" placeholder="e.g. 2" step="0.5" required>

        <label for="sqft_living">Square Feet</label>
        <input type="number" id="sqft_living" placeholder="e.g. 1800" required>

        <label for="floors">Floors</label>
        <input type="number" id="floors" placeholder="e.g. 2" step="0.5" required>

        <label for="yr_built">Year Built</label>
        <input type="number" id="yr_built" placeholder="e.g. 1998" required>

        <label for="address">Street Address</label>
        <input type="text" id="address" placeholder="e.g. 123 Main St" required>

        <label for="zipcode">Zipcode</label>
        <input type="text" id="zipcode" placeholder="e.g. 07071" required>

        <label for="listing_price">Listing Price</label>
        <input type="number" id="listing_price" placeholder="e.g. 750000" required>

        <label for="days_on_market">Days on Market</label>
        <input type="number" id="days_on_market" placeholder="e.g. 12" required>

        <button type="submit">Estimate Price</button>
    </form>

    <div id="result" class="result">Results will appear here.</div>

    <p style="font-size: 12px; color: gray; margin-top: 20px;">
    Disclaimer: This estimate is based on a general analysis of multiple factors and should be used as an indicative value. Actual market prices may vary.
    </p>

</div>

<script>
document.getElementById("houseForm").addEventListener("submit", async function(event) {
    event.preventDefault();

    const data = {
        bedrooms: parseInt(document.getElementById("bedrooms").value),
        bathrooms: parseFloat(document.getElementById("bathrooms").value),
        sqft_living: parseInt(document.getElementById("sqft_living").value),
        floors: parseFloat(document.getElementById("floors").value),
        yr_built: parseInt(document.getElementById("yr_built").value),
        address: document.getElementById("address").value,
        zipcode: document.getElementById("zipcode").value,
        listing_price: parseFloat(document.getElementById("listing_price").value),
        days_on_market: parseInt(document.getElementById("days_on_market").value)
    };

    const resultDiv = document.getElementById("result");
    resultDiv.innerHTML = "Loading...";

    try {
        const response = await fetch("https://nj-real-estate-analyst.onrender.com/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        // Dynamic colors
        let statusColor = result.price_status === "Overpriced" ? "red" :
                          result.price_status === "Underpriced" ? "green" : "orange";

        let riskColor = result.price_drop_risk === "HIGH" ? "red" :
                        result.price_drop_risk === "MEDIUM" ? "orange" : "green";

        resultDiv.innerHTML = `
            <h3>Results</h3>
            <p><b>Estimated Fair Price:</b> $${result.estimated_fair_price}</p>
            <p><b>Listing Price:</b> $${result.listing_price}</p>
            <p><b>Difference:</b> ${result.price_difference_percent}%</p>

            <p><b>Status:</b> 
                <span class="badge ${statusColor}">
                    ${result.price_status}
                </span>
            </p>

            <p><b>Likelihood of Price Drop:</b> 
                <span class="badge ${riskColor}">
                    ${result.price_drop_risk}
                </span>
            </p>

            <p><b>Explanation:</b><br>
            ${result.explanation}</p>
        `;

    } catch (error) {
        resultDiv.innerHTML = "Error connecting to backend.";
    }
});
</script>

</body>
</html>
